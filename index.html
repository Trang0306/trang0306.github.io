<!DOCTYPE html><html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pro5</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">  <style>
    :root{
      --c1:#52EDFF;
      --c2:#054981;
      --c3:#041124;
      --text:rgba(240,251,255,0.95);
      --muted:rgba(240,251,255,0.7);
      --glass:rgba(4,17,36,0.55);
      --shadow:0 20px 60px rgba(0,0,0,0.45);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'Open Sans',sans-serif;
      color:var(--text);
      background:#020816;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:url('https://i.pinimg.com/originals/a5/fc/80/a5fc80fb3e5fc8b422d4ed0b11201aee.gif') center/cover no-repeat;
      filter:blur(8px) brightness(0.35);
      transform:scale(1.05);
      z-index:-2;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:linear-gradient(180deg,rgba(4,17,36,0.4),rgba(4,17,36,0.85));
      z-index:-1;
    }

    .wrap{
      width:min(1200px,95%);
      margin:auto;
      padding:20px 0;
    }

    /* INTRO */
    .intro{
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      background:rgba(0,0,0,0.85);
      z-index:9999;
      cursor:pointer;
    }

    .intro h1{
      font-size:2.5rem;
      text-align:center;
    }

    /* CARD */
    .card{
      display:grid;
      grid-template-columns:1.3fr 1fr;
      gap:16px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(82,237,255,0.15);
      border-radius:24px;
      padding:18px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
    }

    /* LEFT */
    .left{
      display:grid;
      grid-template-columns:150px 1fr;
      gap:14px;
      align-items:center;
    }

    .avatar-wrap{
      position:relative;
      width:150px;
      height:150px;
    }

    .avatar{
      width:100%;
      height:100%;
      border-radius:50%;
      object-fit:cover;
      border:3px solid rgba(255,255,255,0.1);
      box-shadow:0 0 25px rgba(82,237,255,0.2);
    }

    .deco{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
    }

    .status{
      position:absolute;
      bottom:10px;
      right:10px;
      width:16px;
      height:16px;
      border-radius:50%;
      border:2px solid #041124;
    }

    .online{background:#23a55a}
    .idle{background:#f0b232}
    .dnd{background:#f23f43}
    .offline{background:#666}

    .name{
      font-size:1.6rem;
      font-weight:800;
    }

    .typing{
      border-right:2px solid var(--c1);
      white-space:nowrap;
      overflow:hidden;
    }

    .sub{
      color:var(--muted);
      margin-top:6px;
    }

    /* RIGHT */
    .right{
      display:grid;
      gap:12px;
    }

    .box{
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(82,237,255,0.1);
      border-radius:16px;
      padding:12px;
    }

    .social a{
      display:block;
      color:white;
      text-decoration:none;
      margin:6px 0;
    }

    /* CLICK */
    .click{
      position:fixed;
      color:var(--c1);
      animation:fly 1s forwards;
    }

    @keyframes fly{
      to{transform:translateY(-20px);opacity:0}
    }
  </style></head>
<body><div class="intro" id="intro">
  <h1>Liệu còn có ai ở đây?</h1>
</div><div class="wrap" id="main" style="display:none">  <div class="card"><!-- LEFT -->
<div class="left">
  <div class="avatar-wrap">
    <img id="avatar" class="avatar" src="file1.jpg">
    <img id="deco" class="deco">
    <div id="status" class="status offline"></div>
  </div>

  <div>
    <div class="name" id="username">Ari</div>
    <div id="typing" class="typing"></div>
    <div class="sub">Date to marry 💍</div>

    <div class="sub" id="about">
      MBTI: INFP | Song Ngư | vẽ, đọc, game
    </div>
  </div>
</div>

<!-- RIGHT -->
<div class="right">
  <div class="box" id="timeBox"></div>
  <div class="box social">
    <a href="#">Facebook</a>
    <a href="#">X</a>
    <a href="#">Discord</a>
  </div>
</div>

  </div></div><audio id="music" loop>
  <source src="music.mp3">
</audio><script>
const intro=document.getElementById('intro');
const main=document.getElementById('main');
const music=document.getElementById('music');

intro.onclick=()=>{
  intro.style.display='none';
  main.style.display='block';
  music.play();
}

// typing
let txt="Don't call me tonight";
let i=0;
setInterval(()=>{
  if(i<txt.length){
    document.getElementById('typing').innerText+=txt[i++];
  }
},80);

// time
let start=new Date("2025-11-17");
setInterval(()=>{
  let now=new Date();
  let d=Math.floor((now-start)/86400000);
  document.getElementById('timeBox').innerText="+"+d+" days";
},1000);

// click
window.onclick=e=>{
  let c=document.createElement('div');
  c.className='click';
  c.style.left=e.clientX+'px';
  c.style.top=e.clientY+'px';
  c.innerText='✨';
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),1000);
}
</script></body>
</html>
