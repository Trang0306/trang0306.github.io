<!DOCTYPE html><html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pro5 Ari</title><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet"><style>
:root{
--c1:#52EDFF;
--c2:#054981;
--c3:#041124;
--glass:rgba(4,17,36,.45);
--line:rgba(82,237,255,.16);
--text:#f4fcff;
--muted:rgba(255,255,255,.72);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Open Sans',sans-serif;
background:#000;
color:var(--text);
overflow-x:hidden;
}

/* GIF BG */
body::before{
content:"";
position:fixed;
inset:0;
background:url("https://i.pinimg.com/originals/a5/fc/80/a5fc80fb3e5fc8b422d4ed0b11201aee.gif") center/cover no-repeat;
filter:blur(8px) brightness(.35);
transform:scale(1.08);
z-index:-3;
}

body::after{
content:"";
position:fixed;
inset:0;
background:linear-gradient(180deg,rgba(4,17,36,.25),rgba(4,17,36,.85));
z-index:-2;
}

/* RAIN CANVAS */
#rain{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;
}

/* intro */
#intro{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,.84);
z-index:9999;
cursor:pointer;
}

#intro h1{font-size:2.1rem;text-align:center;}
#intro p{margin-top:10px;color:#ccc;}

/* main */
.wrap{width:min(1200px,94%);margin:auto;padding:25px 0;display:none;}

.hero{
display:grid;
grid-template-columns:1.2fr .9fr;
gap:16px;
padding:18px;
background:var(--glass);
border:1px solid var(--line);
border-radius:24px;
backdrop-filter:blur(10px);
box-shadow:0 20px 50px rgba(0,0,0,.4);
}

.left{display:flex;flex-direction:column;justify-content:center;gap:12px;}

.badge{display:inline-block;padding:7px 14px;border-radius:999px;border:1px solid var(--line);width:max-content;font-size:.8rem;letter-spacing:.15em;}

.name{font-size:4rem;font-weight:800;background:linear-gradient(90deg,#fff,var(--c1),#fff);-webkit-background-clip:text;color:transparent;animation:shine 4s linear infinite;}
@keyframes shine{to{background-position:220%}}

.typing{font-size:1.2rem;font-weight:700;border-right:2px solid var(--c1);white-space:nowrap;overflow:hidden;}
.sub{color:var(--muted);}

.row{display:flex;flex-wrap:wrap;gap:10px;}

.pill{padding:9px 14px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);}

.dot{width:10px;height:10px;border-radius:50%;}
.online{background:#23a55a}
.idle{background:#f0b232}
.dnd{background:#f23f43}
.offline{background:#666}

.right{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}

.avatarWrap{position:relative;width:220px;height:220px;}
.avatar{width:100%;height:100%;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.08);}

.status{position:absolute;right:15px;bottom:18px;width:18px;height:18px;border-radius:50%;border:3px solid var(--c3);}

/* CARDS FADED 50% */
.card{
padding:16px;
border-radius:22px;
background:rgba(4,17,36,.5);
border:1px solid var(--line);
backdrop-filter:blur(8px);
opacity:0.5;
}

.title{font-size:.82rem;letter-spacing:.14em;color:#9bcddb;margin-bottom:14px;}

.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:16px;}

@media(max-width:980px){.hero,.grid{grid-template-columns:1fr;}.name{font-size:3rem;}}

/* RIPPLE EFFECT */
.ripple{
position:fixed;
border-radius:50%;
transform:scale(0);
animation:ripple 0.7s ease-out;
border:2px solid rgba(82,237,255,.6);
}
@keyframes ripple{
to{transform:scale(12);opacity:0;}
}
</style></head>
<body><canvas id="rain"></canvas>

<div id="intro">
<h1>Liệu còn có ai ở đây?</h1>
<p>Chạm để mở profile</p>
</div><div class="wrap" id="main">
<div class="hero">
<div class="left">
<div class="badge">DISCORD PRO5</div>
<div class="name">Ari nèk</div>
<div class="typing" id="typing"></div>
<div class="sub">Date to marry 💍</div>
</div>
<div class="right">
<div class="avatarWrap">
<img class="avatar" src="file1.jpg">
<div class="status offline"></div>
</div>
</div>
</div><div class="grid">
<div class="card"><div class="title">About</div>MBTI INFP</div>
<div class="card"><div class="title">Presence</div>Online</div>
<div class="card"><div class="title">Social</div>Links</div>
</div>
</div><script>
/* INTRO */
const intro=document.getElementById('intro');
const main=document.getElementById('main');
intro.onclick=()=>{
intro.style.display='none';
main.style.display='block';
initRain();
}

/* TYPING */
let t="Don't call me tonight",i=0;
function typing(){
let el=document.getElementById('typing');
if(!el) return;
el.innerHTML='';
let x=setInterval(()=>{
el.innerHTML+=t[i++];
if(i>=t.length) clearInterval(x);
},70);
}

/* RAIN EFFECT */
function initRain(){
const canvas=document.getElementById('rain');
const ctx=canvas.getContext('2d');
canvas.width=innerWidth;
canvas.height=innerHeight;

let drops=Array(200).fill().map(()=>({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
l:Math.random()*1+0.5,
s:Math.random()*4+4
}));

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.strokeStyle='rgba(255,255,255,.15)';
ctx.lineWidth=1;
for(let d of drops){
ctx.beginPath();
ctx.moveTo(d.x,d.y);
ctx.lineTo(d.x,d.y+d.l*10);
ctx.stroke();

d.y+=d.s;
if(d.y>canvas.height){d.y=-20;d.x=Math.random()*canvas.width;}
}
requestAnimationFrame(draw);
}
draw();
}

/* RIPPLE CLICK */
document.addEventListener('click',(e)=>{
let r=document.createElement('div');
r.className='ripple';
r.style.left=e.clientX+'px';
r.style.top=e.clientY+'px';
r.style.width=r.style.height='20px';
document.body.appendChild(r);
setTimeout(()=>r.remove(),700);
});
</script></body>
</html>
