<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pro5</title>

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--c1:#52EDFF;
--glass:rgba(4,17,36,.35);
--line:rgba(82,237,255,.14);
--text:#fff;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Open Sans',sans-serif;
background:#000;
overflow-x:hidden;
color:var(--text);
}

/* BACKGROUND GIF */
body::before{
content:"";
position:fixed;
inset:0;
background:url("https://i.pinimg.com/originals/a5/fc/80/a5fc80fb3e5fc8b422d4ed0b11201aee.gif") center/cover no-repeat;
filter:blur(8px) brightness(.35);
z-index:-3;
transform:scale(1.1);
}

body::after{
content:"";
position:fixed;
inset:0;
background:linear-gradient(180deg,rgba(0,0,0,.2),rgba(0,0,0,.85));
z-index:-2;
}

/* RAIN */
.rain{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
}

.drop{
position:absolute;
width:1px;
height:60px;
background:rgba(255,255,255,.25);
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(120vh);
}
}

/* WATER RIPPLES CANVAS */
#ripple{
position:fixed;
inset:0;
z-index:0;
pointer-events:none;
}

/* INTRO */
#intro{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,.85);
z-index:9999;
cursor:pointer;
}

/* MAIN */
.wrap{
display:none;
width:min(1100px,95%);
margin:auto;
padding:20px;
}

/* CARD GLASS MỜ */
.card{
display:flex;
gap:18px;
padding:18px;
border-radius:24px;

/* 👇 KEY FIX: MỜ + SEE THROUGH */
background:rgba(4,17,36,.25);
backdrop-filter:blur(18px);
border:1px solid rgba(82,237,255,.15);
box-shadow:0 20px 60px rgba(0,0,0,.45);
}

/* LEFT */
.left{
flex:1;
display:flex;
flex-direction:column;
gap:10px;
}

.name{
font-size:3rem;
font-weight:800;
background:linear-gradient(90deg,#fff,var(--c1));
-webkit-background-clip:text;
color:transparent;
}

.typing{
border-right:2px solid var(--c1);
white-space:nowrap;
overflow:hidden;
width:max-content;
}

/* RIGHT */
.right{
width:240px;
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

.avatar{
width:170px;
height:170px;
border-radius:50%;
object-fit:cover;
box-shadow:0 0 25px var(--c1);
}

.status{
width:14px;height:14px;border-radius:50%;
position:absolute;
bottom:15px;right:20px;
border:2px solid #000;
}

.online{background:#23a55a}
.idle{background:#f0b232}
.dnd{background:#f23f43}
.offline{background:#666}

/* SOCIAL */
.social{
margin-top:15px;
display:flex;
gap:10px;
}

.social a{
padding:10px 14px;
border-radius:12px;
background:rgba(255,255,255,.05);
color:#fff;
text-decoration:none;
border:1px solid rgba(255,255,255,.1);
}
</style>
</head>

<body>

<canvas id="ripple"></canvas>
<div class="rain" id="rain"></div>

<div id="intro">
<h1>Liệu còn có ai ở đây?</h1>
<p>Click để vào</p>
</div>

<div class="wrap" id="main">

<div class="card">

<!-- LEFT -->
<div class="left">
<div class="name">Ari</div>
<div class="typing" id="typing"></div>
<div>Date to marry 💍</div>

<div id="activity">Loading...</div>

<div class="social">
<a href="#">Facebook</a>
<a href="#">Discord</a>
</div>
</div>

<!-- RIGHT -->
<div class="right">
<div style="position:relative">
<img id="avatar" class="avatar" src="file1.jpg">
<div id="statusDot" class="status offline"></div>
</div>
</div>

</div>
</div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<script>

/* ================= INTRO ================= */
const intro=document.getElementById("intro");
const main=document.getElementById("main");
const music=document.getElementById("music");

intro.onclick=()=>{
intro.style.display="none";
main.style.display="block";
music.play();
typing();
startRain();
}

/* ================= TYPE ================= */
function typing(){
let txt="Don't call me tonight";
let i=0;
let el=document.getElementById("typing");

let t=setInterval(()=>{
el.innerHTML+=txt[i];
i++;
if(i>=txt.length) clearInterval(t);
},80);
}

/* ================= DISCORD ================= */
const ID="965608704974151710";

async function getDiscord(){
try{
let res=await fetch("https://api.lanyard.rest/v1/users/"+ID);
let json=await res.json();
let d=json.data;

/* AVATAR */
document.getElementById("avatar").src=
"https://cdn.discordapp.com/avatars/"+ID+"/"+d.discord_user.avatar+".png?size=512";

/* STATUS */
let st=d.discord_status || "offline";
document.getElementById("statusDot").className="status "+st;

/* ACTIVITY */
let txt="Offline...";

if(d.listening_to_spotify)
txt="🎧 "+d.spotify.song;
else if(d.activities.length>0)
txt="🎮 "+d.activities[0].name;

document.getElementById("activity").innerText=txt;

}catch(e){
console.log(e);
}
}
setInterval(getDiscord,4000);
getDiscord();

/* ================= RAIN ================= */
function startRain(){
const rain=document.getElementById("rain");

for(let i=0;i<80;i++){
let d=document.createElement("div");
d.className="drop";
d.style.left=Math.random()*100+"vw";
d.style.animationDuration=(Math.random()*1+0.5)+"s";
d.style.opacity=Math.random();
rain.appendChild(d);
}
}

/* ================= RIPPLE (simple canvas) ================= */
const canvas=document.getElementById("ripple");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let ripples=[];

window.addEventListener("mousemove",e=>{
ripples.push({x:e.clientX,y:e.clientY,r:0});
});

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=0;i<ripples.length;i++){
let r=ripples[i];
ctx.beginPath();
ctx.arc(r.x,r.y,r.r,0,Math.PI*2);
ctx.strokeStyle="rgba(82,237,255,.3)";
ctx.stroke();
r.r+=2;
if(r.r>80) ripples.splice(i,1);
}

requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
