<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pro5 Ari</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--c1:#52EDFF;
--c2:#054981;
--c3:#041124;
--text:#f4fcff;
--muted:rgba(255,255,255,.72);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Open Sans',sans-serif;
background:#000;
color:var(--text);
overflow-x:hidden;
}

/* BACKGROUND */
body::before{
content:"";
position:fixed;
inset:0;
background:url("https://i.pinimg.com/originals/a5/fc/80/a5fc80fb3e5fc8b422d4ed0b11201aee.gif") center/cover no-repeat;
filter:blur(8px) brightness(.35);
transform:scale(1.08);
z-index:-3;
animation:ripple 10s infinite linear;
}

body::after{
content:"";
position:fixed;
inset:0;
background:linear-gradient(180deg,rgba(4,17,36,.25),rgba(4,17,36,.85));
z-index:-2;
}

@keyframes ripple{
0%{filter:blur(8px) brightness(.35)}
50%{filter:blur(10px) brightness(.4)}
100%{filter:blur(8px) brightness(.35)}
}

/* RAIN */
.rain{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
z-index:0;
}

.drop{
position:absolute;
width:1px;
height:60px;
background:rgba(255,255,255,0.2);
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(120vh);}
}

/* INTRO */
#intro{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
background:rgba(0,0,0,.85);
z-index:9999;
cursor:pointer;
}

/* MAIN */
.wrap{
display:none;
width:min(1200px,94%);
margin:auto;
padding:25px 0;
}

/* HERO */
.hero{
display:grid;
grid-template-columns:1.2fr .9fr;
gap:16px;
padding:18px;
background:rgba(4,17,36,.25);
backdrop-filter:blur(28px);
border:1px solid rgba(82,237,255,.18);
border-radius:24px;
}

/* TEXT */
.name{
font-size:3.8rem;
font-weight:800;
background:linear-gradient(90deg,#fff,var(--c1),#fff);
-webkit-background-clip:text;
color:transparent;
}

.typing{
font-size:1.2rem;
border-right:2px solid var(--c1);
white-space:nowrap;
}

/* STATUS */
.pill{
padding:8px 12px;
border-radius:999px;
background:rgba(255,255,255,.05);
display:flex;
gap:8px;
align-items:center;
}

.dot{width:10px;height:10px;border-radius:50%}
.online{background:#23a55a}
.idle{background:#f0b232}
.dnd{background:#f23f43}
.offline{background:#666}

/* AVATAR */
.avatarWrap{position:relative;width:220px;height:220px}
.avatar{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
border:3px solid rgba(255,255,255,.1);
}
.status{
position:absolute;
right:15px;
bottom:18px;
width:18px;
height:18px;
border-radius:50%;
border:3px solid #041124;
}

/* GUILD */
.guild{
display:flex;
gap:10px;
align-items:center;
padding:10px;
border-radius:16px;
background:rgba(255,255,255,.04);
}

.guild img{
width:40px;height:40px;border-radius:10px;
}

/* CARD */
.card{
background:rgba(4,17,36,.25);
backdrop-filter:blur(28px);
border:1px solid rgba(82,237,255,.18);
padding:16px;
border-radius:18px;
margin-top:16px;
}

/* CLICK */
.click{
position:fixed;
pointer-events:none;
color:var(--c1);
animation:fly .9s forwards;
}

@keyframes fly{
to{transform:translateY(-25px);opacity:0}
}
</style>
</head>

<body>

<div class="rain"></div>

<div id="intro">
<h1>Liệu còn có ai ở đây?</h1>
<p>Chạm để vào</p>
</div>

<div class="wrap" id="main">

<div class="hero">

<div>
<div class="name">Ari</div>
<div class="typing" id="typing"></div>

<div class="pill">
<div class="dot offline" id="dot"></div>
<span id="statusText">offline</span>
</div>

<div class="pill" id="activity">Offline...</div>
</div>

<div>

<div class="avatarWrap">
<img id="avatar" class="avatar" src="file1.jpg">
<div id="statusDot" class="status offline"></div>
</div>

<div class="guild">
<img src="guild.png">
<div>
<div style="font-weight:700">Server</div>
<div style="font-size:.85rem;color:#ccc">Discord Guild</div>
</div>
</div>

</div>

</div>

<div class="card">
<div id="presence">Loading...</div>
</div>

</div>

<script>
const USER_ID="965608704974151710";

const intro=document.getElementById("intro");
const main=document.getElementById("main");

intro.onclick=()=>{
intro.style.display="none";
main.style.display="block";
typing();
getDiscord();
rain();
};

/* typing */
function typing(){
let t="Don't call me tonight";
let i=0;
let el=document.getElementById("typing");
let x=setInterval(()=>{
el.innerHTML+=t[i++];
if(i>=t.length)clearInterval(x);
},80);
}

/* STATUS */
function setStatus(s){
document.getElementById("statusText").innerText=s;
document.getElementById("dot").className="dot "+s;
document.getElementById("statusDot").className="status "+s;
}

/* DISCORD FIXED */
async function getDiscord(){
try{
let res=await fetch("https://api.lanyard.rest/v1/users/"+USER_ID);
let json=await res.json();
let d=json.data;

if(!d) return;

/* avatar */
let av=d.discord_user.avatar;
if(av){
document.getElementById("avatar").src=
`https://cdn.discordapp.com/avatars/${USER_ID}/${av}.png?size=512`;
}

/* status */
setStatus(d.discord_status||"offline");

/* activity safe */
let text="Offline...";
let act=d.activities||[];

if(d.listening_to_spotify && d.spotify){
text="🎧 "+d.spotify.song+" - "+d.spotify.artist;
}else{
let c=act.find(x=>x.type===4);
let g=act.find(x=>x.type===0);
if(c) text="💬 "+c.state;
else if(g) text="🎮 "+g.name;
}

document.getElementById("activity").innerText=text;
document.getElementById("presence").innerText=text;

}catch(e){
console.log(e);
}
}

/* RAIN */
function rain(){
const r=document.querySelector(".rain");
for(let i=0;i<60;i++){
let d=document.createElement("div");
d.className="drop";
d.style.left=Math.random()*100+"vw";
d.style.animationDuration=(0.5+Math.random()*1.5)+"s";
r.appendChild(d);
}
}

/* CLICK */
document.onclick=e=>{
let s=document.createElement("div");
s.className="click";
s.innerText="✨";
s.style.left=e.clientX+"px";
s.style.top=e.clientY+"px";
document.body.appendChild(s);
setTimeout(()=>s.remove(),900);
}
</script>

</body>
</html>
