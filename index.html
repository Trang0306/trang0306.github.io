<!DOCTYPE html><html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pro5 Decor</title><link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"><style>
:root{
  --c1:#52EDFF;
  --c2:#054981;
  --c3:#041124;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Open Sans',sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  color:white;
  background:black;
}

/* BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background:url('https://i.pinimg.com/originals/a5/fc/80/a5fc80fb3e5fc8b422d4ed0b11201aee.gif') center/cover no-repeat;
  filter:blur(6px) brightness(0.5);
  transform:scale(1.1);
  z-index:-3;
}

.overlay{
  position:fixed;
  inset:0;
  background:linear-gradient(120deg,var(--c3),var(--c2));
  opacity:0.65;
  z-index:-2;
}

/* CLICK INTRO */
.intro{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.7);
  z-index:999;
  cursor:pointer;
}

.intro h1{
  font-size:28px;
  letter-spacing:2px;
  animation:fade 2s infinite alternate;
}

@keyframes fade{
  from{opacity:0.3}
  to{opacity:1}
}

/* MAIN CARD */
.container{
  display:none;
  width:100%;
  height:100%;
  padding:30px;
}

.card{
  display:flex;
  gap:20px;
  height:100%;
}

.left{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.right{
  width:320px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.name{
  font-size:48px;
  font-weight:700;
  color:var(--c1);
  overflow:hidden;
  white-space:nowrap;
  border-right:2px solid var(--c1);
  width:0;
  animation:typing 3s steps(20,end) forwards;
}

@keyframes typing{
  to{width:100%}
}

.sub{
  margin-top:10px;
  font-size:18px;
  opacity:0.8;
}

.section{
  margin-top:20px;
  padding:10px 15px;
  background:rgba(0,0,0,0.3);
  border-left:3px solid var(--c1);
  border-radius:8px;
}

.marquee{
  white-space:nowrap;
  overflow:hidden;
  border-top:1px solid rgba(255,255,255,0.2);
  border-bottom:1px solid rgba(255,255,255,0.2);
  padding:8px;
}

.marquee span{
  display:inline-block;
  animation:move 8s linear infinite;
}

@keyframes move{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}

.avatar{
  width:180px;
  height:180px;
  border-radius:20px;
  border:2px solid var(--c1);
  box-shadow:0 0 20px var(--c1);
  object-fit:cover;
}

.badge{
  margin-top:10px;
  font-size:14px;
  opacity:0.8;
}

.info{
  margin-top:15px;
  font-size:14px;
  line-height:1.6;
}

.social a{
  color:var(--c1);
  display:block;
  margin-top:5px;
  font-size:13px;
  text-decoration:none;
}

.time{
  margin-top:15px;
  font-size:14px;
  color:#fff;
  opacity:0.8;
}

.footer-img{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.footer-img img{
  width:120px;
  height:80px;
  object-fit:cover;
  border-radius:10px;
  border:1px solid var(--c1);
}

</style></head>
<body><div class="bg"></div>
<div class="overlay"></div><div class="intro" onclick="start()">
  <h1>Liệu còn có ai ở đây?</h1>
</div><div class="container" id="app">
  <div class="card"><div class="left">
  <div class="name" id="name">Ari</div>
  <div class="sub">Don't call me tonight</div>
  <div class="sub">Date to marry 💍</div>

  <div class="marquee"><span id="statusText">Loading status...</span></div>

  <div class="section">
    MBTI: INFP<br>
    Zodiac: Song Ngư<br>
    Sở thích: vẽ, đọc truyện, nghe nhạc<br>
    Game: Genshin, HSR, Wuthering Waves<br>
    Waifu: Cartethyia
  </div>

  <div class="time" id="timer"></div>

  <div class="social">
    <a href="https://www.facebook.com/share/1AuHDmJLrP/">Facebook</a>
    <a href="https://x.com/PhmQunh42254275">X</a>
    <a href="https://discord.gg/XZAk8MWx">Discord</a>
    <a href="https://discord.gg/gachaparadise">Server Discord (ᒪᑌᑎᗩ)</a>
  </div>

  <div class="footer-img">
    <img src="file1.jpg" />
    <img src="file2.jpg" />
  </div>
</div>

<div class="right">
  <img class="avatar" src="file1.jpg" id="avatar" />
  <div class="badge">Discord ID: 965608704974151710</div>
</div>

  </div>
</div><audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio><script>
function start(){
  document.querySelector('.intro').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('music').play();
  typeName();
}

function typeName(){
  let el=document.getElementById('name');
  let text="Ari";
  el.textContent="";
  let i=0;
  let t=setInterval(()=>{
    el.textContent+=text[i];
    i++;
    if(i>=text.length) clearInterval(t);
  },150);
}

function updateStatus(){
  let h=new Date().getHours();
  let msg="";
  if(h>=5 && h<11) msg="Một ngày mới lại đến rồi";
  else if(h>=11 && h<18) msg="Ngày trôi qua sắp hết rồi";
  else msg="Mội ngày đi qua, có điều gì ở lại với chúng ta?";
  document.getElementById('statusText').textContent=msg;
}

function timer(){
  let start=new Date("2025-11-17T00:00:00");
  setInterval(()=>{
    let now=new Date();
    let diff=now-start;

    let d=Math.floor(diff/(1000*60*60*24));
    let h=Math.floor(diff/(1000*60*60)%24);
    let m=Math.floor(diff/(1000*60)%60);
    let s=Math.floor(diff/1000%60);

    document.getElementById('timer').textContent=
    `Time: ${d}d ${h}h ${m}m ${s}s`;
  },1000);
}

function lanyard(){
  const ws=new WebSocket("wss://api.lanyard.rest/socket");
  ws.onopen=()=>{
    ws.send(JSON.stringify({op:2,d:{subscribe_to_id:"965608704974151710"}}));
  };

  ws.onmessage=(m)=>{
    let data=JSON.parse(m.data);
    if(!data || !data.d) return;
    let status=data.d.discord_status;
    document.title="Ari | "+status;
  };
}

updateStatus();
timer();
lanyard();
setInterval(updateStatus,60000);
</script></body>
</html>
