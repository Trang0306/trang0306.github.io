<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Pro5 Ari</title>

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;600&display=swap" rel="stylesheet">

<style>
:root{
    --c1:#52EDFF;
    --c2:#054981;
    --c3:#041124;
}

body{
    margin:0;
    font-family:'Open Sans', sans-serif;
    color:white;
    overflow:hidden;
    background:var(--c3);
}

/* BACKGROUND GIF */
#bg{
    position:fixed;
    width:120%;
    height:120%;
    background:url("https://i.pinimg.com/originals/a5/fc/80/a5fc80fb3e5fc8b422d4ed0b11201aee.gif") center/cover no-repeat;
    filter:brightness(0.35);
    z-index:-3;
}

#overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,var(--c3),var(--c2));
    opacity:0.6;
    z-index:-2;
}

/* canvas wave */
canvas{
    position:fixed;
    top:0;left:0;
    z-index:-1;
}

/* INTRO */
#intro{
    position:fixed;
    width:100%;
    height:100%;
    background:var(--c3);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    z-index:999;
    cursor:pointer;
}

/* MAIN */
#main{display:none;text-align:center;padding-top:40px;}

/* typing */
#text{
    font-size:22px;
    border-right:2px solid white;
    display:inline-block;
    white-space:nowrap;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    width:340px;
    margin:20px auto;
    padding:20px;
    border-radius:18px;
    border:1px solid rgba(82,237,255,0.2);
    box-shadow:0 0 30px rgba(82,237,255,0.15);
}

/* avatar */
.avatar-wrap{position:relative;display:inline-block;}

.avatar{
    width:120px;
    border-radius:50%;
}

/* STATUS */
.status{
    width:14px;
    height:14px;
    border-radius:50%;
    position:absolute;
    bottom:6px;
    right:6px;
    border:3px solid var(--c3);
}

/* ===================== */
/* DECO DISCORD FIX HERE */
/* ===================== */
#deco{
    position:absolute;
    top:-15px;
    left:-15px;
    width:150px;
    pointer-events:none;
    z-index:2;
}

/* NAME */
.name{
    font-size:20px;
    font-weight:600;
    background:linear-gradient(90deg,var(--c1),var(--c2),var(--c1));
    background-size:200%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:flow 3s linear infinite;
}

@keyframes flow{
    to{background-position:200%;}
}

/* BUTTON */
.btn{
    display:block;
    margin:10px auto;
    padding:10px;
    width:220px;
    border-radius:20px;
    text-decoration:none;
    color:white;
    background:rgba(82,237,255,0.08);
    transition:0.3s;
}

.btn:hover{
    background:var(--c1);
    color:black;
    box-shadow:0 0 15px var(--c1);
}

/* spark */
.spark{
    position:absolute;
    color:var(--c1);
    animation:up 1s forwards;
}

@keyframes up{
    to{transform:translateY(-20px);opacity:0;}
}
</style>
</head>

<body>

<div id="bg"></div>
<div id="overlay"></div>
<canvas id="wave"></canvas>

<div id="intro">Liệu còn có ai ở đây?</div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<div id="main">

<h2 id="text"></h2>

<div class="card">

<div class="avatar-wrap">
<img id="avatar" class="avatar">
<img id="deco">
<span id="status" class="status"></span>
</div>

<h3 class="name">Ari</h3>

<p id="activity"></p>

<h4>Date to marry 💍</h4>
<p id="time"></p>

<p>
MBTI: INFP<br>
Cung: Song Ngư<br>
Sở thích: vẽ, viết, đọc truyện, nghe nhạc<br>
Game: Genshin / HSR / Wuthering Wave<br>
Waifu: Cartethyia
</p>

<a class="btn" href="https://www.facebook.com/share/1AuHDmJLrP/">Facebook</a>
<a class="btn" href="https://x.com/PhmQunh42254275">X</a>
<a class="btn" href="https://discord.gg/XZAk8MWx">Discord</a>
<a class="btn" href="https://discord.gg/gachaparadise">Server</a>

</div>

<img src="file1.jpg" width="180">
<img src="file2.jpg" width="180">

</div>

<script>

/* INTRO */
intro.onclick=()=>{
    intro.style.display="none";
    main.style.display="block";
    music.play();
}

/* typing */
let t="Don't call me tonight";
let i=0;
setInterval(()=>{
    if(i<t.length) text.innerHTML+=t[i++];
},90);

/* time */
let start=new Date("2025-11-17");
setInterval(()=>{
    let d=new Date()-start;
    time.innerHTML=
    Math.floor(d/86400000)+" ngày "+
    Math.floor(d/3600000)%24+" giờ "+
    Math.floor(d/60000)%60+" phút "+
    Math.floor(d/1000)%60+" giây";
},1000);

/* DISCORD */
const id="965608704974151710";

async function load(){
let r=await fetch(`https://api.lanyard.rest/v1/users/${id}`);
let d=(await r.json()).data;

/* avatar */
avatar.src=`https://cdn.discordapp.com/avatars/${id}/${d.discord_user.avatar}.png`;

/* name */
username.innerHTML=d.discord_user.global_name||"Ari";

/* status glow */
let stColor=
d.discord_status=="online"?"#23a55a":
d.discord_status=="idle"?"#f0b232":
d.discord_status=="dnd"?"#f23f43":"gray";

status.style.background=stColor;
avatar.style.boxShadow=`0 0 20px ${stColor}`;

/* ACTIVITY */
if(d.listening_to_spotify){
    activity.innerHTML="🎧 "+d.spotify.song;
}
else if(d.activities.length){
    activity.innerHTML="🎮 "+d.activities[0].name;
}
else{
    activity.innerHTML="🌙 Chill mode";
}

/* ========================= */
/* DECO DISCORD (FIXED) */
/* ========================= */
if(
    d.discord_user.avatar_decoration_data &&
    d.discord_user.avatar_decoration_data.asset
){
    let decoId = d.discord_user.avatar_decoration_data.asset;

    document.getElementById("deco").src =
    `https://cdn.discordapp.com/avatar-decoration-presets/${decoId}.png`;

    document.getElementById("deco").style.filter =
    `drop-shadow(0 0 10px ${stColor})`;
}
else{
    document.getElementById("deco").src="";
}
}

setInterval(load,5000);
load();

/* click sparkle */
document.onclick=e=>{
let s=document.createElement("div");
s.className="spark";
s.innerHTML="✨";
s.style.left=e.pageX+"px";
s.style.top=e.pageY+"px";
document.body.appendChild(s);
setTimeout(()=>s.remove(),1000);
}

/* wave */
let c=document.getElementById("wave");
let ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let t2=0;
function draw(){
ctx.clearRect(0,0,c.width,c.height);
for(let i=0;i<50;i++){
ctx.fillStyle="rgba(82,237,255,0.08)";
ctx.beginPath();
ctx.arc(i*30+Math.sin(t2+i)*10,c.height/2+Math.cos(t2+i)*20,40,0,Math.PI*2);
ctx.fill();
}
t2+=0.02;
requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
