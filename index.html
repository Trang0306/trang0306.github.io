<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Pro5</title>

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Open Sans', sans-serif;
    color:white;
    text-align:center;
    overflow:hidden;
    background:#041124;
}

/* GIF nền cuối */
#bg{
    position:fixed;
    width:110%;
    height:110%;
    background:url("https://i.pinimg.com/originals/a5/fc/80/a5fc80fb3e5fc8b422d4ed0b11201aee.gif") center/cover no-repeat;
    z-index:-2;
    filter:brightness(0.35);
    transition:0.2s;
}

/* overlay xanh */
#overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,#041124cc,#05498166);
    z-index:-1;
}

/* canvas sao */
canvas{
    position:fixed;
    top:0;left:0;
    z-index:0;
}

/* intro */
#intro{
    position:fixed;
    width:100%;
    height:100%;
    background:#041124;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    z-index:999;
    cursor:pointer;
}

/* card glassmorphism Nitro */
.card{
    background:rgba(5,73,129,0.25);
    backdrop-filter: blur(12px);
    width:340px;
    margin:auto;
    padding:20px;
    border-radius:18px;
    box-shadow:0 0 25px #52EDFF55;
    border:1px solid #52EDFF33;
    position:relative;
    z-index:2;
}

/* avatar */
.avatar-wrap{
    position:relative;
    display:inline-block;
}

.avatar{
    width:120px;
    border-radius:50%;
    transition:0.3s;
}

/* glow theo status */
.status{
    width:14px;
    height:14px;
    border-radius:50%;
    position:absolute;
    bottom:6px;
    right:6px;
    border:2px solid #041124;
}

/* deco Discord */
#deco{
    position:absolute;
    top:-10px;
    left:-10px;
    width:140px;
    pointer-events:none;
}

/* name animation */
.name{
    font-weight:600;
    background:linear-gradient(90deg,#52EDFF,#054981,#52EDFF);
    background-size:200%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:flow 3s linear infinite;
}
@keyframes flow{
    100%{background-position:200%;}
}

/* typing */
#text{
    font-size:20px;
    border-right:2px solid #52EDFF;
    display:inline-block;
    white-space:nowrap;
    overflow:hidden;
}

/* button */
.btn{
    display:block;
    margin:8px auto;
    padding:10px;
    width:220px;
    border-radius:20px;
    text-decoration:none;
    color:white;
    background:rgba(82,237,255,0.08);
    border:1px solid #52EDFF33;
}
.btn:hover{
    background:#52EDFF;
    color:#041124;
}

/* ripple nước */
.ripple{
    position:absolute;
    border-radius:50%;
    background:rgba(82,237,255,0.4);
    transform:scale(0);
    animation:ripple 0.7s linear;
}
@keyframes ripple{
    to{transform:scale(6);opacity:0;}
}

/* click effect */
.click{
    position:absolute;
    color:#52EDFF;
    animation:fade 1s forwards;
}
@keyframes fade{
    to{opacity:0;transform:translateY(-20px);}
}

/* info */
.small{
    font-size:13px;
    opacity:0.8;
}
</style>
</head>

<body>

<div id="bg"></div>
<div id="overlay"></div>
<canvas id="stars"></canvas>

<div id="intro">Liệu còn có ai ở đây?</div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<div id="main" style="display:none;">

<h2 id="text"></h2>

<br>

<div class="card">

<div class="avatar-wrap">
<img id="avatar" class="avatar">
<img id="deco">
<span id="status" class="status"></span>
</div>

<h3 id="username" class="name"></h3>
<div class="small" id="badge"></div>

<p id="activity"></p>

<h4>Date to marry 💍</h4>
<p id="time"></p>

<p>
MBTI: INFP<br>
Cung: Song Ngư<br>
Sở thích: vẽ, viết + đọc truyện, nghe nhạc<br>
Game: Genshin Impact, Honkai Star Rail, Wuthering Wave<br>
Waifu: Cartethyia
</p>

<a class="btn" href="https://www.facebook.com/share/1AuHDmJLrP/">Facebook</a>
<a class="btn" href="https://x.com/PhmQunh42254275">X</a>
<a class="btn" href="https://discord.gg/XZAk8MWx">Discord</a>
<a class="btn" href="https://discord.gg/gachaparadise">Server</a>

<br>

<img src="file1.jpg" width="150">
<img src="file2.jpg" width="150">

</div>
</div>

<script>

/* intro */
intro.onclick=()=>{
    intro.style.display="none";
    main.style.display="block";
    music.play();
}

/* typing */
let textContent="Don't call me tonight";
let i=0;
function type(){
    if(i<textContent.length){
        text.innerHTML+=textContent[i++];
        setTimeout(type,80);
    }
}
type();

/* time counter */
let start=new Date("2025-11-17");
setInterval(()=>{
    let now=new Date();
    let d=new Date(now-start);

    let days=Math.floor((now-start)/86400000);
    let h=now.getHours();
    let m=now.getMinutes();
    let s=now.getSeconds();

    time.innerHTML=`${days} ngày ${h} giờ ${m} phút ${s} giây`;
},1000);

/* DISCORD LANYARD */
const userId="965608704974151710";

async function getDiscord(){
    let res=await fetch(`https://api.lanyard.rest/v1/users/${userId}`);
    let d=(await res.json()).data;

    username.innerText=d.discord_user.global_name || d.discord_user.username;

    avatar.src=`https://cdn.discordapp.com/avatars/${userId}/${d.discord_user.avatar}.png?size=256`;

    /* status glow */
    let c="gray";
    if(d.discord_status==="online") c="#23a55a";
    else if(d.discord_status==="idle") c="#f0b232";
    else if(d.discord_status==="dnd") c="#f23f43";

    status.style.background=c;
    avatar.style.boxShadow=`0 0 20px ${c}`;

    /* nitro badge */
    badge.innerHTML = (d.discord_user.premium_type==2) ? "✨ Discord Nitro User" : "";

    /* activity */
    if(d.listening_to_spotify){
        activity.innerHTML=`🎧 ${d.spotify.song} - ${d.spotify.artist}`;
    }else if(d.activities.length){
        activity.innerHTML=`🎮 ${d.activities[0].name || d.activities[0].state}`;
    }else{
        activity.innerHTML="🌙 Online nhẹ nhàng";
    }

    /* deco */
    if(d.discord_user.avatar_decoration_data){
        deco.src=`https://cdn.discordapp.com/avatar-decoration-presets/${d.discord_user.avatar_decoration_data.asset}.png`;
    }
}
setInterval(getDiscord,5000);
getDiscord();

/* parallax */
document.addEventListener("mousemove",e=>{
    let x=(e.clientX/window.innerWidth-0.5)*20;
    let y=(e.clientY/window.innerHeight-0.5)*20;
    bg.style.transform=`translate(${x}px,${y}px)`;
});

/* ripple */
document.onclick=e=>{
    let r=document.createElement("span");
    r.className="ripple";
    r.style.left=e.pageX+"px";
    r.style.top=e.pageY+"px";
    document.body.appendChild(r);
    setTimeout(()=>r.remove(),700);
}

/* click effect */
document.onclick=e=>{
    let c=document.createElement("div");
    c.className="click";
    c.style.left=e.pageX+"px";
    c.style.top=e.pageY+"px";
    c.innerHTML="✨";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1000);
}

/* stars */
let c=document.getElementById("stars");
let ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let stars=[];
for(let i=0;i<120;i++){
    stars.push({x:Math.random()*c.width,y:Math.random()*c.height});
}

function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    ctx.fillStyle="#52EDFF";
    stars.forEach(s=>{
        ctx.fillRect(s.x,s.y,2,2);
        s.y+=0.3;
        if(s.y>c.height)s.y=0;
    });
    requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
