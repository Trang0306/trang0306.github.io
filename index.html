<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Pro5 Ari</title>

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Open Sans', sans-serif;
    color:white;
    overflow:hidden;
    background:#041124;
}

/* ===== BACKGROUND GIF ===== */
#bg{
    position:fixed;
    width:100%;
    height:100%;
    background:url("https://i.pinimg.com/originals/a5/fc/80/a5fc80fb3e5fc8b422d4ed0b11201aee.gif") center/cover no-repeat;
    filter:brightness(0.35) blur(2px);
    z-index:-3;
}

/* ocean overlay */
#ocean{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(180deg,#041124,#054981);
    opacity:0.5;
    z-index:-2;
}

/* water canvas */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* INTRO */
#intro{
    position:fixed;
    width:100%;
    height:100%;
    background:#041124;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    z-index:999;
    cursor:pointer;
}

/* MAIN */
#main{display:none;text-align:center;}

/* CARD GLASS */
.card{
    background:rgba(4,17,36,0.65);
    backdrop-filter:blur(12px);
    width:340px;
    margin:auto;
    padding:20px;
    border-radius:18px;
    box-shadow:0 0 30px #52EDFF;
}

/* NAME */
.name{
    font-weight:600;
    font-size:22px;
    background:linear-gradient(90deg,#52EDFF,#054981,#52EDFF);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:flow 3s linear infinite;
}
@keyframes flow{
    0%{background-position:0;}
    100%{background-position:200%;}
}

/* typing */
#text{
    font-size:22px;
    border-right:2px solid #52EDFF;
    white-space:nowrap;
}

/* AVATAR */
.avatar-wrap{
    position:relative;
    display:inline-block;
}

/* avatar glow ring */
.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    border:3px solid transparent;
    background:linear-gradient(#041124,#041124) padding-box,
               linear-gradient(135deg,#52EDFF,#054981,#52EDFF) border-box;
    transition:0.3s;
}

/* DISCORD DECO */
#deco{
    position:absolute;
    top:-18px;
    left:-18px;
    width:155px;
    height:155px;
    pointer-events:none;
    animation:spin 8s linear infinite;
    filter:drop-shadow(0 0 10px #52EDFF);
}
@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* STATUS */
.status{
    width:14px;
    height:14px;
    border-radius:50%;
    position:absolute;
    bottom:6px;
    right:6px;
    border:3px solid #041124;
}

/* NITRO BADGE */
.nitro{
    position:absolute;
    top:0;
    right:-10px;
    background:#ff73fa;
    padding:2px 6px;
    border-radius:8px;
    font-size:10px;
}

/* BUTTON */
.btn{
    display:block;
    margin:8px auto;
    padding:10px;
    width:220px;
    border-radius:20px;
    text-decoration:none;
    color:white;
    background:rgba(82,237,255,0.15);
}
.btn:hover{
    background:#52EDFF;
    color:black;
}

/* CLICK EFFECT */
.click{
    position:absolute;
    color:#52EDFF;
    animation:fade 1s forwards;
}
@keyframes fade{
    to{opacity:0;transform:translateY(-20px);}
}
</style>
</head>

<body>

<div id="bg"></div>
<div id="ocean"></div>
<canvas id="water"></canvas>

<div id="intro">Liệu còn có ai ở đây?</div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<div id="main">

<h2 id="text"></h2>

<div class="card">

<div class="avatar-wrap">
<img id="avatar" class="avatar">
<img id="deco">
<div class="nitro">NITRO</div>
<span id="status" class="status"></span>
</div>

<h3 id="username" class="name">Ari</h3>

<p>💍 Date to marry</p>
<p id="time"></p>

<hr>

<p>
MBTI: INFP<br>
Cung: Song Ngư<br>
Sở thích: vẽ, viết, đọc truyện, nghe nhạc<br>
Game: Genshin Impact, Honkai Star Rail, Wuthering Wave<br>
Waifu: Cartethyia
</p>

<hr>

<a class="btn" href="https://www.facebook.com/share/1AuHDmJLrP/">Facebook</a>
<a class="btn" href="https://x.com/PhmQunh42254275">X</a>
<a class="btn" href="https://discord.gg/XZAk8MWx">Discord</a>
<a class="btn" href="https://discord.gg/gachaparadise">Server</a>

</div>
</div>

<script>

/* INTRO */
intro.onclick=()=>{
    intro.style.display="none";
    main.style.display="block";
    music.play();
}

/* typing */
let t="Don't call me tonight";
let i=0;
function type(){
    if(i<t.length){
        text.innerHTML+=t[i++];
        setTimeout(type,90);
    }
}
type();

/* timer */
let start=new Date("2025-11-17");
setInterval(()=>{
    let now=new Date();
    let d=Math.floor((now-start)/86400000);
    let h=Math.floor((now/3600000)%24);
    let m=Math.floor((now/60000)%60);
    let s=Math.floor((now/1000)%60);
    time.innerHTML=`${d} ngày ${h} giờ ${m} phút ${s} giây`;
},1000);

/* DISCORD */
const userId="965608704974151710";

async function getDiscord(){
    let res=await fetch(`https://api.lanyard.rest/v1/users/${userId}`);
    let d=(await res.json()).data;

    username.innerHTML=d.discord_user.global_name || "Ari";

    let av=d.discord_user.avatar
    ?`https://cdn.discordapp.com/avatars/${userId}/${d.discord_user.avatar}.png`
    :"https://cdn.discordapp.com/embed/avatars/0.png";

    avatar.src=av;

    /* STATUS GLOW */
    if(d.discord_status==="online"){
        status.style.background="#23a55a";
        avatar.style.boxShadow="0 0 20px #23a55a";
    }else if(d.discord_status==="idle"){
        status.style.background="#f0b232";
        avatar.style.boxShadow="0 0 20px #f0b232";
    }else if(d.discord_status==="dnd"){
        status.style.background="#f23f43";
        avatar.style.boxShadow="0 0 20px #f23f43";
    }else{
        status.style.background="gray";
        avatar.style.boxShadow="0 0 10px gray";
    }

    /* activity */
    if(d.listening_to_spotify){
        text.innerHTML="🎧 "+d.spotify.song;
    }else if(d.activities.length){
        text.innerHTML="🎮 "+d.activities[0].name;
    }

    /* DECO DISCORD */
    if(d.discord_user.avatar_decoration_data){
        let decoId=d.discord_user.avatar_decoration_data.asset;
        document.getElementById("deco").src=
        `https://cdn.discordapp.com/avatar-decoration-presets/${decoId}.png`;
    }else{
        document.getElementById("deco").src="";
    }
}
setInterval(getDiscord,5000);
getDiscord();

/* CLICK EFFECT */
document.onclick=e=>{
    let c=document.createElement("div");
    c.className="click";
    c.innerHTML="✨";
    c.style.left=e.pageX+"px";
    c.style.top=e.pageY+"px";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1000);
};

/* WATER SIMPLE ANIMATION */
let c=document.getElementById("water");
let ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    for(let i=0;i<80;i++){
        ctx.fillStyle="rgba(82,237,255,0.05)";
        ctx.beginPath();
        ctx.arc(
            Math.sin(Date.now()*0.001+i)*50+i*20,
            i*15%innerHeight,
            2,0,Math.PI*2
        );
        ctx.fill();
    }
    requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
