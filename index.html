<!DOCTYPE html><html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro5 Ocean Card</title><link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;600&display=swap" rel="stylesheet"><style>
:root{
  --c1:#52EDFF;
  --c2:#054981;
  --c3:#041124;
}

body{
  margin:0;
  font-family:'Open Sans',sans-serif;
  color:white;
  overflow-x:hidden;
  background:var(--c3);
}

/* BACKGROUND GIF */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url('https://i.pinimg.com/originals/a5/fc/80/a5fc80fb3e5fc8b422d4ed0b11201aee.gif') center/cover;
  filter:brightness(0.35) blur(2px);
  z-index:-2;
}

/* PARTICLES */
canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* INTRO */
#intro{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
  background:rgba(0,0,0,0.8);
  cursor:pointer;
  z-index:999;
}

/* CARD */
.container{
  display:flex;
  gap:20px;
  padding:40px;
  max-width:1100px;
  margin:auto;
  perspective:1000px;
}

.card{
  flex:1;
  background:rgba(5,73,129,0.25);
  border:1px solid rgba(82,237,255,0.2);
  border-radius:20px;
  padding:20px;
  backdrop-filter:blur(10px);
  transform-style:preserve-3d;
  transition:0.3s;
}
.card:hover{
  transform:rotateY(5deg) rotateX(5deg);
}

.left, .right{
  flex:1;
}

.center{
  flex:1.2;
}

/* AVATAR */
.avatar-wrap{
  position:relative;
  width:140px;
  margin:auto;
}

.avatar{
  width:140px;
  height:140px;
  border-radius:50%;
  border:3px solid var(--c1);
  box-shadow:0 0 20px var(--c1);
}

.status-dot{
  position:absolute;
  bottom:10px;
  right:10px;
  width:18px;
  height:18px;
  border-radius:50%;
  border:3px solid black;
}

/* TEXT */
.typing{
  font-size:20px;
  border-right:2px solid var(--c1);
  white-space:nowrap;
  overflow:hidden;
}

h2{
  color:var(--c1);
}

/* BUTTON */
.btn{
  display:block;
  margin:8px 0;
  padding:10px;
  border-radius:12px;
  text-decoration:none;
  color:white;
  background:rgba(255,255,255,0.08);
}

/* LANYARD */
#lanyard img{
  width:100%;
  border-radius:12px;
}

/* CLICK EFFECT */
.click{
  position:absolute;
  color:var(--c1);
  animation:fade 1s forwards;
}
@keyframes fade{
  to{opacity:0;transform:translateY(-20px);}
}
</style></head>
<body><div id="intro">Liệu còn có ai ở đây?</div><audio id="music" src="music.mp3" loop></audio>

<canvas id="particles"></canvas>

<div class="container" id="main" style="display:none">  <!-- LEFT -->  <div class="card left">
    <h2 id="typing"></h2>
    <p>"Date to marry 💍"</p>
    <p id="statusText"></p>
    <p id="timer"></p>
  </div>  <!-- CENTER -->  <div class="card center">
    <div class="avatar-wrap">
      <img src="file1.jpg" class="avatar" id="avatar">
      <div class="status-dot" id="dot"></div>
    </div><p><b>MBTI:</b> INFP</p>
<p><b>Cung:</b> Song Ngư</p>
<p><b>Sở thích:</b> vẽ, viết, đọc truyện, nghe nhạc</p>
<p><b>Game:</b> Genshin, HSR, Wuthering Waves</p>
<p><b>Waifu:</b> Cartethyia</p>

  </div>  <!-- RIGHT -->  <div class="card right">
    <div id="lanyard"></div><a class="btn" href="#">Facebook</a>
<a class="btn" href="#">X</a>
<a class="btn" href="#">Discord</a>
<a class="btn" href="#">Server ᒪᑌᑎᗩ</a>

<img src="file1.jpg" width="100%" style="border-radius:12px;margin-top:10px">
<img src="file2.jpg" width="100%" style="border-radius:12px;margin-top:10px">

  </div></div><script>
const intro=document.getElementById('intro');
const main=document.getElementById('main');
const music=document.getElementById('music');

intro.onclick=()=>{
  intro.style.display='none';
  main.style.display='flex';
  music.play();
}

/* typing */
let txt="Don't call me tonight";
let i=0;
function type(){
  if(i<txt.length){
    document.getElementById('typing').innerHTML+=txt[i++];
    setTimeout(type,80);
  }
}
type();

/* TIME TIMER */
let start=new Date("2025-11-17");
setInterval(()=>{
  let n=new Date();
  let d=n-start;
  let days=Math.floor(d/86400000);
  let h=Math.floor(d/3600000)%24;
  let m=Math.floor(d/60000)%60;
  document.getElementById('timer').innerText=`${days}d ${h}h ${m}m`;
},1000);

/* STATUS TEXT */
function statusMsg(){
  let h=new Date().getHours();
  if(h<11) return "Một ngày mới lại đến rồi";
  if(h<18) return "Ngày trôi qua sắp hết rồi";
  return "Mọi điều ở lại với chúng ta?";
}
setInterval(()=>{
  document.getElementById('statusText').innerText=statusMsg();
},2000);

/* LANYARD DISCORD */
async function loadLanyard(){
  let res=await fetch("https://api.lanyard.rest/v1/users/965608704974151710");
  let data=await res.json();
  let d=data.data;

  let status=d.discord_status;
  let dot=document.getElementById('dot');

  dot.style.background=
    status==='online'?'#00ff88':
    status==='dnd'?'red':
    status==='idle'?'orange':'gray';

  document.getElementById('lanyard').innerHTML=
  `<img src='https://cdn.lanyard.rest/avatars/${d.discord_user.id}/${d.discord_user.avatar}.png'>`;
}
loadLanyard();

/* PARTICLES */
const c=document.getElementById('particles');
const ctx=c.getContext('2d');
c.width=innerWidth;
c.height=innerHeight;

let p=[];
for(let i=0;i<80;i++){
  p.push({x:Math.random()*c.width,y:Math.random()*c.height,r:2});
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  ctx.fillStyle="#52EDFF";
  p.forEach(v=>{
    v.y+=0.5;
    if(v.y>c.height)v.y=0;
    ctx.beginPath();
    ctx.arc(v.x,v.y,v.r,0,Math.PI*2);
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();

/* CLICK EFFECT */
document.onclick=e=>{
  let d=document.createElement('div');
  d.className='click';
  d.style.left=e.pageX+'px';
  d.style.top=e.pageY+'px';
  d.innerHTML='✨';
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),1000);
}
</script></body>
</html>
