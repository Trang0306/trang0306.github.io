<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Pro5</title>

<style>
body{
    margin:0;
    font-family:Arial;
    color:white;
    text-align:center;
    background:black;
    overflow-x:hidden;
}

/* nền động */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    animation:bg 20s infinite alternate;
    z-index:-1;
    filter:brightness(0.4);
}
@keyframes bg{
    0%{background-image:url("file1.jpg");}
    100%{background-image:url("file2.jpg");}
}

/* intro */
#intro{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    z-index:999;
    cursor:pointer;
}

/* card */
.card{
    background:rgba(20,20,30,0.8);
    width:320px;
    margin:auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,255,255,0.3);
}

/* avatar */
.avatar-wrap{
    position:relative;
    display:inline-block;
}

.avatar{
    width:120px;
    border-radius:50%;
    box-shadow:0 0 20px cyan;
}

/* deco */
#deco{
    position:absolute;
    top:-10px;
    left:-10px;
    width:140px;
    pointer-events:none;
}

/* status */
.status{
    width:16px;
    height:16px;
    border-radius:50%;
    position:absolute;
    bottom:5px;
    right:5px;
    border:3px solid black;
}

/* button */
.btn{
    display:block;
    margin:10px auto;
    padding:10px;
    width:220px;
    border-radius:20px;
    text-decoration:none;
    color:white;
    background:rgba(255,255,255,0.1);
}
.btn:hover{
    background:cyan;
    color:black;
}

/* typing */
.typing{
    border-right:2px solid white;
    white-space:nowrap;
    overflow:hidden;
}

/* click */
.click{
    position:absolute;
    color:cyan;
    animation:fade 1s forwards;
}
@keyframes fade{
    to{opacity:0;transform:translateY(-20px);}
}
</style>
</head>

<body>

<div id="intro">Liệu còn có ai ở đây?</div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<div id="main" style="display:none;">

<br><br>

<h2 id="text" class="typing"></h2>

<br>

<div class="card">

<div class="avatar-wrap">
<img id="avatar" class="avatar">
<img id="deco">
<span id="status" class="status"></span>
</div>

<h3 id="username">Loading...</h3>

<p id="activity">Loading...</p>

<h4>Date to marry 💍</h4>
<p id="time"></p>

<p>
MBTI: INFP<br>
Cung: Song Ngư<br>
Sở thích: vẽ, viết + đọc truyện, nghe nhạc<br>
Game: Genshin Impact, Honkai Star Rail, Wuthering Wave<br>
Waifu: Cartethyia
</p>

<a class="btn" href="https://www.facebook.com/share/1AuHDmJLrP/">Facebook</a>
<a class="btn" href="https://x.com/PhmQunh42254275">X</a>
<a class="btn" href="https://discord.gg/XZAk8MWx">Discord</a>
<a class="btn" href="https://discord.gg/gachaparadise">Server</a>

</div>

<br>

<img src="file1.jpg" width="200">
<img src="file2.jpg" width="200">

</div>

<script>

/* intro */
intro.onclick=()=>{
    intro.style.display="none";
    main.style.display="block";
    music.play();
}

/* typing */
let t="Don't call me tonight";
let i=0;
function type(){
    if(i<t.length){
        text.innerHTML+=t[i];
        i++;
        setTimeout(type,100);
    }
}
type();

/* time */
let start=new Date("2025-11-17");
setInterval(()=>{
    let now=new Date();
    let diff=now-start;

    let d=Math.floor(diff/86400000);
    let h=Math.floor(diff/3600000)%24;
    let m=Math.floor(diff/60000)%60;
    let s=Math.floor(diff/1000)%60;

    time.innerHTML=d+" ngày "+h+" giờ "+m+" phút "+s+" giây";
},1000);

/* DISCORD REAL FULL */
const userId="965608704974151710";

async function getDiscord(){
    try{
        let res=await fetch(`https://api.lanyard.rest/v1/users/${userId}`);
        let data=await res.json();
        let d=data.data;

        /* tên */
        username.innerHTML = d.discord_user.global_name || d.discord_user.username;

        /* avatar */
        let avatar = d.discord_user.avatar;
        avatar = avatar
        ? `https://cdn.discordapp.com/avatars/${userId}/${avatar}.png?size=256`
        : `https://cdn.discordapp.com/embed/avatars/0.png`;
        document.getElementById("avatar").src = avatar;

        /* status */
        let st=document.getElementById("status");
        if(d.discord_status==="online") st.style.background="#23a55a";
        else if(d.discord_status==="idle") st.style.background="#f0b232";
        else if(d.discord_status==="dnd") st.style.background="#f23f43";
        else st.style.background="gray";

        /* activity */
        let act="Offline...";
        if(d.listening_to_spotify){
            act="🎧 "+d.spotify.song+" - "+d.spotify.artist;
        }
        else if(d.activities.length>0){
            let a=d.activities[0];
            if(a.type===4){
                act="💬 "+(a.state||"...");
            }else{
                act="🎮 "+a.name;
            }
        }
        activity.innerHTML=act;

        /* deco */
        if(d.discord_user.avatar_decoration_data){
            let deco=d.discord_user.avatar_decoration_data.asset;
            document.getElementById("deco").src=
            `https://cdn.discordapp.com/avatar-decoration-presets/${deco}.png`;
        }

    }catch(e){
        console.log("API lỗi");
    }
}

setInterval(getDiscord,5000);
getDiscord();

/* click */
document.onclick=e=>{
    let c=document.createElement("div");
    c.className="click";
    c.style.left=e.pageX+"px";
    c.style.top=e.pageY+"px";
    c.innerHTML="✨";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1000);
}

</script>

</body>
</html>
