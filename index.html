<!DOCTYPE html>  
<html lang="vi">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width,initial-scale=1.0">  
<title>Pro5 Ari</title>  

<link rel="preconnect" href="https://fonts.googleapis.com">  
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">  

<style>  
:root{  
--c1:#52EDFF;  
--c2:#054981;  
--c3:#041124;  
--glass:rgba(4,17,36,.30); /* ↓ giảm còn ~50% opacity */  
--line:rgba(82,237,255,.16);  
--text:#f4fcff;  
--muted:rgba(255,255,255,.72);  
}  

*{margin:0;padding:0;box-sizing:border-box;}  

body{  
font-family:'Open Sans',sans-serif;  
background:#000;  
color:var(--text);  
overflow-x:hidden;  
}  

/* ===== BACKGROUND GIF ===== */  
body::before{  
content:"";  
position:fixed;  
inset:0;  
background:url("https://i.pinimg.com/originals/a5/fc/80/a5fc80fb3e5fc8b422d4ed0b11201aee.gif") center/cover no-repeat;  
filter:blur(8px) brightness(.35);  
transform:scale(1.08);  
z-index:-3;  
}  

body::after{  
content:"";  
position:fixed;  
inset:0;  
background:linear-gradient(180deg,rgba(4,17,36,.25),rgba(4,17,36,.85));  
z-index:-2;  
}  

/* ===== RAIN EFFECT ===== */  
canvas#rain{  
position:fixed;  
inset:0;  
z-index:-1;  
pointer-events:none;  
}  

/* ===== INTRO ===== */  
#intro{  
position:fixed;  
inset:0;  
display:flex;  
justify-content:center;  
align-items:center;  
flex-direction:column;  
background:rgba(0,0,0,.84);  
z-index:9999;  
cursor:pointer;  
}  

#intro h1{font-size:2.1rem;text-align:center;}  
#intro p{margin-top:10px;color:#ccc;}  

/* ===== MAIN ===== */  
.wrap{  
width:min(1200px,94%);  
margin:auto;  
padding:25px 0;  
display:none;  
}  

/* ===== HERO ===== */  
.hero{  
display:grid;  
grid-template-columns:1.2fr .9fr;  
gap:16px;  
padding:18px;  
background:var(--glass);  
border:1px solid var(--line);  
border-radius:24px;  
backdrop-filter:blur(14px);  
box-shadow:0 20px 50px rgba(0,0,0,.4);  
}  

.card{  
padding:16px;  
border-radius:22px;  
background:var(--glass);  
border:1px solid var(--line);  
backdrop-filter:blur(14px);  
}  

/* ===== RIPPLE ===== */  
.ripple{  
position:fixed;  
width:20px;height:20px;  
border-radius:50%;  
border:2px solid var(--c1);  
transform:translate(-50%,-50%);  
animation:ripple .6s linear forwards;  
pointer-events:none;  
}  

@keyframes ripple{  
to{  
width:200px;  
height:200px;  
opacity:0;  
}  
}  

/* ===== KEEP YOUR ORIGINAL STYLE ===== */  
.left{display:flex;flex-direction:column;gap:12px;}  
.name{font-size:4rem;font-weight:800;}  
.typing{border-right:2px solid var(--c1);}  

</style>  
</head>  

<body>  

<canvas id="rain"></canvas>  

<div id="intro">  
<h1>Liệu còn có ai ở đây?</h1>  
<p>Chạm để mở profile</p>  
</div>  

<div class="wrap" id="main">  

<div class="hero">  
<div class="left">  
<div class="name">Ari nèk</div>  
<div class="typing" id="typing"></div>  
</div>  
</div>  

</div>  

<script>  

/* ===== INTRO ===== */  
const intro=document.getElementById("intro");  
const main=document.getElementById("main");  

intro.onclick=()=>{  
intro.style.display="none";  
main.style.display="block";  
startRain();  
typing();  
};  

/* ===== TYPING ===== */  
function typing(){  
let t="Don't call me tonight";  
let i=0;  
let el=document.getElementById("typing");  
let x=setInterval(()=>{  
el.innerHTML+=t[i++];  
if(i>=t.length) clearInterval(x);  
},80);  
}  

/* ===== RAIN EFFECT ===== */  
const canvas=document.getElementById("rain");  
const ctx=canvas.getContext("2d");  

let w,h;  
function resize(){  
w=canvas.width=window.innerWidth;  
h=canvas.height=window.innerHeight;  
}  
resize();  
window.addEventListener("resize",resize);  

let drops=[];  
for(let i=0;i<120;i++){  
drops.push({  
x:Math.random()*w,  
y:Math.random()*h,  
l:Math.random()*20+10,  
s:Math.random()*4+4  
});  
}  

function drawRain(){  
ctx.clearRect(0,0,w,h);  
ctx.strokeStyle="rgba(82,237,255,.25)";  
ctx.lineWidth=1;  

for(let d of drops){  
ctx.beginPath();  
ctx.moveTo(d.x,d.y);  
ctx.lineTo(d.x,d.y+d.l);  
ctx.stroke();  

d.y+=d.s;  
if(d.y>h){  
d.y=-20;  
d.x=Math.random()*w;  
}  
}  
requestAnimationFrame(drawRain);  
}  

function startRain(){  
drawRain();  
}  

/* ===== RIPPLE CLICK ===== */  
document.addEventListener("click",(e)=>{  
let r=document.createElement("div");  
r.className="ripple";  
r.style.left=e.clientX+"px";  
r.style.top=e.clientY+"px";  
document.body.appendChild(r);  
setTimeout(()=>r.remove(),600);  
});  

</script>  

</body>  
</html>
