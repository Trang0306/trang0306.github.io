<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Pro5</title>

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Open Sans', sans-serif;
    color:white;
    text-align:center;
    overflow:hidden;
    background:#041124;
}

/* ===== BACKGROUND ANIMATION ===== */
#bg{
    position:fixed;
    width:110%;
    height:110%;
    z-index:-3;
    background-size:cover;
    background-position:center;
    animation:bg 20s infinite alternate;
    filter:brightness(0.4);
    transition:0.2s;
}
@keyframes bg{
    0%{background-image:url("file1.jpg");}
    100%{background-image:url("file2.jpg");}
}

/* gif overlay */
#bg2{
    position:fixed;
    width:100%;
    height:100%;
    background:url("https://i.pinimg.com/originals/a5/fc/80/a5fc80fb3e5fc8b422d4ed0b11201aee.gif") center/cover;
    opacity:0.2;
    z-index:-2;
}

/* stars */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* intro */
#intro{
    position:fixed;
    width:100%;
    height:100%;
    background:#041124;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    z-index:999;
    cursor:pointer;
}

/* main */
#main{display:none;}

/* typing */
#text{
    border-right:2px solid white;
    display:inline-block;
}

/* card */
.card{
    background:rgba(4,17,36,0.85);
    width:320px;
    margin:auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 30px #52EDFF;
}

/* avatar */
.avatar-wrap{
    position:relative;
    display:inline-block;
}
.avatar{
    width:120px;
    border-radius:50%;
}

/* deco */
#deco{
    position:absolute;
    top:-10px;
    left:-10px;
    width:140px;
    pointer-events:none;
}

/* status */
.status{
    width:16px;
    height:16px;
    border-radius:50%;
    position:absolute;
    bottom:5px;
    right:5px;
    border:3px solid #041124;
}

/* name */
.name{
    font-weight:600;
    background:linear-gradient(90deg,#52EDFF,#054981,#52EDFF);
    background-size:200%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:flow 3s linear infinite;
}
@keyframes flow{
    100%{background-position:200%;}
}

/* activity */
.activity-box{
    background:rgba(0,0,0,0.3);
    padding:10px;
    border-radius:10px;
}

/* buttons */
.btn{
    display:block;
    margin:10px auto;
    padding:10px;
    width:220px;
    border-radius:20px;
    text-decoration:none;
    color:white;
    background:rgba(82,237,255,0.1);
}
.btn:hover{
    background:#52EDFF;
    color:black;
}

/* ripple */
.ripple{
    position:absolute;
    border-radius:50%;
    background:rgba(82,237,255,0.5);
    transform:scale(0);
    animation:ripple 0.6s linear;
}
@keyframes ripple{
    to{transform:scale(6);opacity:0;}
}

/* click effect */
.click{
    position:absolute;
    color:cyan;
    animation:fade 1s forwards;
}
@keyframes fade{
    to{opacity:0;transform:translateY(-20px);}
}
</style>
</head>

<body>

<div id="bg"></div>
<div id="bg2"></div>
<canvas id="stars"></canvas>

<div id="intro">Liệu còn có ai ở đây?</div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<div id="main">

<h2 id="text"></h2>

<br><br>

<div class="card">

<div class="avatar-wrap">
<img id="avatar" class="avatar">
<img id="deco">
<span id="status" class="status"></span>
</div>

<h3 id="username" class="name"></h3>

<div class="activity-box" id="activity">Loading...</div>

<h4>Date to marry 💍</h4>
<p id="time"></p>

<p>
MBTI: INFP<br>
Cung: Song Ngư<br>
Sở thích: vẽ, viết, đọc truyện, nghe nhạc<br>
Game: Genshin, HSR, Wuthering Waves<br>
Waifu: Cartethyia
</p>

<a class="btn" href="#">Facebook</a>
<a class="btn" href="#">X</a>
<a class="btn" href="#">Discord</a>

</div>

</div>

<script>

/* intro */
intro.onclick=()=>{
    intro.style.display="none";
    main.style.display="block";
    music.play();
}

/* typing */
let t="Don't call me tonight";
let i=0;
setInterval(()=>{
    if(i<t.length) text.innerHTML+=t[i++];
},80);

/* timer */
let start=new Date("2025-11-17");
setInterval(()=>{
    let now=new Date();
    let d=Math.floor((now-start)/86400000);
    let h=Math.floor((now/3600000)%24);
    let m=Math.floor((now/60000)%60);
    let s=Math.floor((now/1000)%60);
    time.innerHTML=`${d}d ${h}h ${m}m ${s}s`;
},1000);

/* DISCORD */
const userId="965608704974151710";

async function getDiscord(){
    let res=await fetch(`https://api.lanyard.rest/v1/users/${userId}`);
    let d=(await res.json()).data;

    username.innerHTML=d.discord_user.global_name || d.discord_user.username;

    let av=d.discord_user.avatar;
    avatar.src=av
    ? `https://cdn.discordapp.com/avatars/${userId}/${av}.png`
    : "https://cdn.discordapp.com/embed/avatars/0.png";

    let st=status;
    st.style.background=
    d.discord_status==="online"?"#23a55a":
    d.discord_status==="idle"?"#f0b232":
    d.discord_status==="dnd"?"#f23f43":"gray";

    if(d.listening_to_spotify){
        activity.innerHTML=`🎧 ${d.spotify.song} - ${d.spotify.artist}`;
    }else if(d.activities.length){
        activity.innerHTML="🎮 "+d.activities[0].name;
    }

    if(d.discord_user.avatar_decoration_data){
        deco.src=`https://cdn.discordapp.com/avatar-decoration-presets/${d.discord_user.avatar_decoration_data.asset}.png`;
    }
}
setInterval(getDiscord,5000);
getDiscord();

/* stars */
let c=stars,ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;
let s=[...Array(100)].map(()=>({x:Math.random()*c.width,y:Math.random()*c.height}));

function draw(){
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="#52EDFF";
s.forEach(v=>{
ctx.fillRect(v.x,v.y,2,2);
v.y+=0.2;if(v.y>c.height)v.y=0;
});
requestAnimationFrame(draw);
}
draw();

/* parallax */
document.addEventListener("mousemove",e=>{
let x=(e.clientX/window.innerWidth-0.5)*20;
let y=(e.clientY/window.innerHeight-0.5)*20;
bg.style.transform=`translate(${x}px,${y}px)`;
});

/* ripple */
document.onclick=e=>{
let r=document.createElement("span");
r.className="ripple";
r.style.left=e.pageX+"px";
r.style.top=e.pageY+"px";
document.body.appendChild(r);
setTimeout(()=>r.remove(),600);

let c=document.createElement("div");
c.className="click";
c.style.left=e.pageX+"px";
c.style.top=e.pageY+"px";
c.innerHTML="✨";
document.body.appendChild(c);
setTimeout(()=>c.remove(),1000);
};

</script>

</body>
</html>
