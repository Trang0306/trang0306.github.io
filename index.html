<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>@Ari nèk</title>

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Open Sans', sans-serif;
}

body{
    background:#041124;
    color:white;
    overflow-x:hidden;
}

/* BACKGROUND */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:url("https://i.pinimg.com/originals/a5/fc/80/a5fc80fb3e5fc8b422d4ed0b11201aee.gif") center/cover;
    opacity:0.22;
    z-index:-2;
}

/* INTRO */
#intro{
    position:fixed;
    inset:0;
    background:#041124;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    cursor:pointer;
    z-index:999;
    transition:0.6s;
}

/* LAYOUT */
.wrapper{
    display:flex;
    gap:20px;
    padding:40px;
}

/* LEFT PROFILE */
.left{
    width:280px;
    background:rgba(5,73,129,0.25);
    border:1px solid #52EDFF;
    border-radius:20px;
    padding:20px;
    backdrop-filter:blur(12px);
    text-align:center;
    transition:0.3s;
}

.left:hover{
    transform:scale(1.02);
}

.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    border:3px solid #52EDFF;
    box-shadow:0 0 15px #52EDFF;
}

.name{
    margin-top:10px;
    font-size:20px;
    font-weight:700;
    color:#52EDFF;
}

.typing{
    font-size:12px;
    margin-top:5px;
    opacity:0.8;
}

/* STATUS */
.statusText{
    margin-top:8px;
    font-size:12px;
    color:#52EDFF;
}

/* RIGHT CARD */
.right{
    flex:1;
    background:rgba(4,17,36,0.55);
    border:1px solid #52EDFF;
    border-radius:20px;
    padding:20px;
    backdrop-filter:blur(15px);
    transform-style:preserve-3d;
    transition:0.3s;
}

.right:hover{
    transform:rotateY(5deg) rotateX(2deg);
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.title{
    font-size:22px;
    font-weight:600;
    color:#52EDFF;
}

/* MARQUEE */
.marquee{
    overflow:hidden;
    white-space:nowrap;
}

.marquee span{
    display:inline-block;
    animation:move 7s linear infinite;
}

@keyframes move{
    0%{transform:translateX(100%)}
    100%{transform:translateX(-100%)}
}

/* BLOCKS */
.block{
    margin-top:15px;
    padding:12px;
    border-left:3px solid #52EDFF;
    background:rgba(5,73,129,0.15);
    border-radius:10px;
}

/* SOCIAL */
a{
    color:#52EDFF;
    text-decoration:none;
}

/* SPOTIFY */
.spotify{
    margin-top:15px;
    padding:10px;
    background:#0b1f33;
    border-radius:12px;
}

.bar{
    height:5px;
    background:#054981;
    margin-top:6px;
    border-radius:10px;
    overflow:hidden;
}

.bar::after{
    content:"";
    display:block;
    height:100%;
    width:55%;
    background:#52EDFF;
    animation:load 6s linear infinite;
}

@keyframes load{
    0%{width:0}
    100%{width:100%}
}

/* AVATAR STATUS GLOW */
.online{box-shadow:0 0 15px #00ff99;}
.dnd{box-shadow:0 0 15px red;}
.idle{box-shadow:0 0 15px yellow;}
.offline{box-shadow:0 0 15px gray;}

</style>
</head>

<body>

<div id="intro">Liệu còn có ai ở đây?</div>

<div class="wrapper">

    <!-- LEFT -->
    <div class="left">
        <img src="file1.jpg" class="avatar" id="avatar">
        <div class="name">Ari</div>
        <div class="typing">Don't call me tonight</div>
        <div class="statusText" id="statusText"></div>
    </div>

    <!-- RIGHT -->
    <div class="right" id="card">

        <div class="header">
            <div class="title">Profile Decor</div>
            <div class="marquee"><span>Don't call me tonight</span></div>
        </div>

        <div class="block">💍 Date to marry</div>

        <div class="block" id="timeBox"></div>

        <div class="block">
            MBTI: INFP <br>
            Cung: Song Ngư <br>
            Sở thích: vẽ, đọc truyện, nghe nhạc <br>
            Game: Genshin / HSR / Wuwa <br>
            Waifu: Cartethyia
        </div>

        <div class="block">
            FB: <a href="#">link</a><br>
            X: <a href="#">link</a><br>
            Discord: <a href="#">link</a><br>
            Server: <a href="#">ᒪᑌᑎᗩ</a>
        </div>

        <div class="spotify">
            🎧 Now Playing: music.mp3
            <div class="bar"></div>
        </div>

        <div class="block">
            <img src="file2.jpg" width="100%">
        </div>

    </div>

</div>

<script>

/* INTRO */
document.getElementById("intro").onclick = ()=>{
    document.getElementById("intro").style.opacity="0";
    setTimeout(()=>document.getElementById("intro").remove(),600);
};

/* TIME COUNTER */
function updateTime(){
    let start = new Date("2025-11-17");
    let now = new Date();
    let diff = now - start;

    let days = Math.floor(diff/86400000);
    let hours = Math.floor(diff/3600000);

    document.getElementById("timeBox").innerHTML =
    `⏳ ${days} ngày | ${hours} giờ`;
}
setInterval(updateTime,1000);
updateTime();

/* STATUS TEXT */
let h = new Date().getHours();
let msg =
h<11 ? "Một ngày mới lại đến rồi" :
h<18 ? "Ngày trôi qua sắp hết rồi" :
"Một ngày đi qua, có điều gì ở lại với chúng ta?";

document.getElementById("statusText").innerText = msg;

/* LANYARD */
fetch("https://api.lanyard.rest/v1/users/965608704974151710")
.then(r=>r.json())
.then(data=>{
    let s = data.data.discord_status;
    document.getElementById("avatar").classList.add(s);
});

/* LIGHT TILT */
document.getElementById("card").onmousemove=(e)=>{
    let x = (window.innerWidth/2 - e.pageX)/40;
    let y = (window.innerHeight/2 - e.pageY)/40;
    e.currentTarget.style.transform =
    `rotateY(${x}deg) rotateX(${y}deg)`;
};

</script>

</body>
</html>
