<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pro5 Ari</title>

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--c1:#52EDFF;
--c3:#041124;
--text:#f4fcff;
--muted:rgba(255,255,255,.72);
}

/* BASE */
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Open Sans',sans-serif;
background:#000;
color:var(--text);
overflow-x:hidden;
}

/* BACKGROUND */
body::before{
content:"";
position:fixed;
inset:0;
background:url("https://i.pinimg.com/originals/a5/fc/80/a5fc80fb3e5fc8b422d4ed0b11201aee.gif") center/cover no-repeat;
filter:blur(8px) brightness(.35);
transform:scale(1.08);
z-index:-3;
animation:ripple 10s infinite linear;
}

body::after{
content:"";
position:fixed;
inset:0;
background:linear-gradient(180deg,rgba(4,17,36,.25),rgba(4,17,36,.85));
z-index:-2;
}

/* RIPPLE */
@keyframes ripple{
0%{filter:blur(8px) brightness(.35)}
50%{filter:blur(10px) brightness(.4)}
100%{filter:blur(8px) brightness(.35)}
}

/* RAIN */
.rain{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
z-index:0;
}

.drop{
position:absolute;
width:1px;
height:80px;
background:rgba(255,255,255,.18);
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(120vh)}
}

/* INTRO */
#intro{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.85);
z-index:9999;
cursor:pointer;
}

/* MAIN */
.wrap{
width:min(1200px,94%);
margin:auto;
padding:25px 0;
display:none;
}

/* HERO */
.hero{
display:grid;
grid-template-columns:1.2fr .9fr;
gap:16px;
padding:18px;
background:rgba(4,17,36,.25);
backdrop-filter:blur(28px);
border:1px solid rgba(82,237,255,.18);
border-radius:24px;
}

/* TEXT */
.name{
font-size:4rem;
font-weight:800;
background:linear-gradient(90deg,#fff,var(--c1),#fff);
-webkit-background-clip:text;
color:transparent;
}

/* STATUS */
.dot{width:10px;height:10px;border-radius:50%}
.online{background:#23a55a}
.idle{background:#f0b232}
.dnd{background:#f23f43}
.offline{background:#666}

/* AVATAR */
.avatarWrap{position:relative;width:220px;height:220px}
.avatar{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
border:3px solid rgba(255,255,255,.1);
}

/* CARD */
.card{
background:rgba(4,17,36,.25);
backdrop-filter:blur(26px);
border:1px solid rgba(82,237,255,.15);
border-radius:18px;
padding:16px;
}

/* SOCIAL */
a{
display:block;
padding:12px;
margin-bottom:10px;
border-radius:12px;
background:rgba(255,255,255,.05);
color:#fff;
text-decoration:none;
}

/* CLICK EFFECT */
.click{
position:fixed;
color:var(--c1);
animation:fly .9s forwards;
pointer-events:none;
}

@keyframes fly{
to{transform:translateY(-25px);opacity:0}
}
</style>
</head>

<body>

<div class="rain"></div>

<div id="intro">
<h1>Liệu còn có ai ở đây?</h1>
<p>Chạm để mở</p>
</div>

<div class="wrap" id="main">

<div class="hero">

<div>
<div class="name">Ari</div>
<div id="typing"></div>

<div>
<span class="dot offline" id="dot"></span>
<span id="statusText">offline</span>
</div>

<div id="activity">Loading...</div>
</div>

<div class="avatarWrap">
<img id="avatar" class="avatar" src="file1.jpg">
</div>

</div>

<div class="card">
<div>Discord Presence</div>
<div id="presence"></div>
</div>

<div class="card">
<div>Social</div>
<a href="https://discord.gg/gachaparadise">Server</a>
</div>

</div>

<script>

const USER_ID="965608704974151710";

/* INTRO */
intro.onclick=()=>{
intro.style.display="none";
main.style.display="block";
typing();
getDiscord();
rain();
}

/* TYPING */
function typing(){
let t="Don't call me tonight";
let i=0;
let el=document.getElementById("typing");
let x=setInterval(()=>{
el.innerText+=t[i++];
if(i>=t.length)clearInterval(x);
},80);
}

/* STATUS */
function setStatus(s){
document.getElementById("statusText").innerText=s;
document.getElementById("dot").className="dot "+s;
}

/* DISCORD SAFE */
async function getDiscord(){
try{
let r=await fetch("https://api.lanyard.rest/v1/users/"+USER_ID);
let j=await r.json();
if(!j.success) return;

let d=j.data;

setStatus(d.discord_status||"offline");

let act="Offline...";
let a=d.activities||[];

if(d.listening_to_spotify && d.spotify){
act="🎧 "+d.spotify.song;
}
else{
let c=a.find(x=>x.type===4);
let g=a.find(x=>x.type===0);
if(c) act=c.state||"";
else if(g) act=g.name||"";
}

document.getElementById("activity").innerText=act;
document.getElementById("presence").innerText=act;

let av=d.discord_user.avatar;
if(av){
document.getElementById("avatar").src=
`https://cdn.discordapp.com/avatars/${USER_ID}/${av}.png`;
}

}catch(e){console.log(e);}
}

/* RAIN */
function rain(){
const r=document.querySelector(".rain");
for(let i=0;i<60;i++){
let d=document.createElement("div");
d.className="drop";
d.style.left=Math.random()*100+"vw";
d.style.animationDuration=(0.6+Math.random()*1.2)+"s";
r.appendChild(d);
}
}

/* CLICK */
document.onclick=e=>{
let s=document.createElement("div");
s.className="click";
s.innerText="✨";
s.style.left=e.clientX+"px";
s.style.top=e.clientY+"px";
document.body.appendChild(s);
setTimeout(()=>s.remove(),900);
}

</script>

</body>
</html>
