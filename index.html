<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Pro5 Ari</title>

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Open Sans', sans-serif;
    color:white;
    text-align:center;
    overflow:hidden;
    background:#041124;
}

/* nền GIF */
#bg{
    position:fixed;
    width:110%;
    height:110%;
    background:url("https://i.pinimg.com/originals/a5/fc/80/a5fc80fb3e5fc8b422d4ed0b11201aee.gif") center/cover no-repeat;
    z-index:-2;
    filter:brightness(0.4);
}

/* overlay */
#bg2{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,#041124,#054981);
    opacity:0.5;
    z-index:-1;
}

/* intro */
#intro{
    position:fixed;
    width:100%;
    height:100%;
    background:#041124;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    z-index:999;
    cursor:pointer;
}

/* card */
.card{
    background:rgba(4,17,36,0.85);
    width:320px;
    margin:auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 30px #52EDFF;

    /* 🔥 PHÓNG TO 150% */
    transform: scale(1.5);
    transform-origin: center;
}

/* avatar */
.avatar-wrap{
    position:relative;
    display:inline-block;
}

/* AVATAR */
.avatar{
    width:120px;
    border-radius:50%;
    position:relative;
    z-index:1;
}

/* STATUS */
.status{
    width:16px;
    height:16px;
    border-radius:50%;
    position:absolute;
    bottom:5px;
    right:5px;
    border:3px solid #041124;
    z-index:3;
}

/* DISCORD DECO */
#deco{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:150px;
    pointer-events:none;
    z-index:2;
}

/* name */
.name{
    font-weight:600;
    background:linear-gradient(90deg,#52EDFF,#054981,#52EDFF);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:flow 3s linear infinite;
}

@keyframes flow{
    100%{background-position:200%;}
}

/* buttons */
.btn{
    display:block;
    margin:10px auto;
    padding:10px;
    width:220px;
    border-radius:20px;
    text-decoration:none;
    color:white;
    background:rgba(82,237,255,0.1);
}
.btn:hover{
    background:#52EDFF;
    color:black;
}

/* ripple */
.ripple{
    position:absolute;
    border-radius:50%;
    background:rgba(82,237,255,0.5);
    transform:scale(0);
    animation:ripple 0.6s linear;
}
@keyframes ripple{
    to{transform:scale(6);opacity:0;}
}
</style>
</head>

<body>

<div id="bg"></div>
<div id="bg2"></div>

<div id="intro">Liệu còn có ai ở đây?</div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<div id="main" style="display:none;">

<h2 id="text"></h2>

<div class="card">

<div class="avatar-wrap">

<img id="avatar" class="avatar">

<img id="deco">

<span id="status" class="status"></span>

</div>

<h3 id="username" class="name">Ari</h3>

<p id="activity"></p>

<h4>Date to marry 💍</h4>
<p id="time"></p>

<p>
MBTI: INFP<br>
Cung: Song Ngư<br>
Sở thích: vẽ, viết + đọc truyện, nghe nhạc<br>
Game: Genshin Impact, Honkai Star Rail, Wuthering Wave<br>
Waifu: Cartethyia
</p>

<a class="btn" href="#">Facebook</a>
<a class="btn" href="#">X</a>
<a class="btn" href="#">Discord</a>
<a class="btn" href="#">Server</a>

</div>

</div>

<script>

/* intro */
intro.onclick=()=>{
    intro.style.display="none";
    main.style.display="block";
    music.play();
}

/* typing */
let t="Don't call me tonight";
let i=0;
setInterval(()=>{
    if(i<t.length) text.innerHTML+=t[i++];
},80);

/* time */
let start=new Date("2025-11-17");
setInterval(()=>{
    let d=new Date()-start;
    time.innerHTML=
    Math.floor(d/86400000)+" ngày "+
    Math.floor(d/3600000)%24+" giờ "+
    Math.floor(d/60000)%60+" phút "+
    Math.floor(d/1000)%60+" giây";
},1000);

/* DISCORD API */
const userId="965608704974151710";

async function getDiscord(){
let res=await fetch(`https://api.lanyard.rest/v1/users/${userId}`);
let d=(await res.json()).data;

/* name */
username.innerHTML=d.discord_user.global_name || "Ari";

/* avatar */
avatar.src=`https://cdn.discordapp.com/avatars/${userId}/${d.discord_user.avatar}.png`;

/* status */
let st=d.discord_status;
status.style.background=
st=="online"?"#23a55a":
st=="idle"?"#f0b232":
st=="dnd"?"#f23f43":"gray";

/* glow */
avatar.style.boxShadow=`0 0 20px ${status.style.background}`;

/* activity */
if(d.listening_to_spotify){
    activity.innerHTML="🎧 "+d.spotify.song;
}
else if(d.activities.length){
    activity.innerHTML="🎮 "+d.activities[0].name;
}
else activity.innerHTML="🌙 Chill";

/* DISCORD DECORATION */
if(d.discord_user.avatar_decoration_data){
    let decoId=d.discord_user.avatar_decoration_data.asset;

    document.getElementById("deco").src=
    `https://cdn.discordapp.com/avatar-decoration-presets/${decoId}.png`;
}else{
    document.getElementById("deco").src="";
}
}

setInterval(getDiscord,5000);
getDiscord();

/* click effect */
document.onclick=e=>{
let r=document.createElement("span");
r.className="ripple";
r.style.left=e.pageX+"px";
r.style.top=e.pageY+"px";
document.body.appendChild(r);
setTimeout(()=>r.remove(),600);
};

</script>

</body>
</html>
